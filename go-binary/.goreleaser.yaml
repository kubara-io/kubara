---
version: 2
project_name: kubara
release:
  github:
    owner: kubara-io
    name: kubara
  draft: true
  replace_existing_draft: true
changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - '^.*?Merge (pull request|branch).*$'
      - '^.*?chore\(release\):.+$'
  groups:
    - title: Breaking changes
      regexp: '^.*?[a-z]+(\([^)]+\))?!:.+$'
      order: 1
    - title: Features
      regexp: '^.*?feat(\([^)]+\))?:.+$'
      order: 10
    - title: Bug fixes
      regexp: '^.*?fix(\([^)]+\))?:.+$'
      order: 20
    - title: Dependency updates
      regexp: '^.*?[a-z]+\((deps[^)]*)\)!?:.+$|^.*?deps(\([^)]+\))?!?:.+$|^.*?bump .+$'
      order: 30
    - title: Documentation
      regexp: '^.*?docs(\([^)]+\))?!?:.+$'
      order: 40
    - title: CI / Build
      regexp: '^.*?(build|ci)(\([^)]+\))?!?:.+$'
      order: 50
    - title: Other changes
      order: 999
builds:
  - id: kubara
    main: ./main.go
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X 'main.version={{ .Tag }}'
      - -X 'main.commit={{ .Commit }}'
      - -X 'main.date={{ .Date }}'
archives:
  - id: binaries
    ids:
      - kubara
    formats:
      - binary
    name_template: "{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
