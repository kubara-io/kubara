name: Pull Request
description: Submit a change to Kubara (CLI, templates, modules or docs)
title: "[PR]: "
labels: ["pending-review"]

body:
  - type: markdown
    attributes:
      value: |
        Please read first <a target="_blank" href="https://docs.kubara.io/latest-stable/5_community/contributing/">how to contribute to Kubara</a>.  

  - type: textarea
    id: summary
    attributes:
      label: 📝 Summary
      placeholder: "What does this PR do? e.g. 'Adds Terraform module for SKE setup'"
    validations:
      required: true

  - type: checkboxes
    id: type
    attributes:
      label: 🧩 Type of change
      options:
        - label: 🔧 CLI / Go code
        - label: 📦 Helm chart
        - label: 🧱 Terraform module
        - label: 📝 Documentation
        - label: 🧪 Test or CI change
        - label: ♻️ Refactor / cleanup

  - type: checkboxes
    id: breaking
    attributes:
      label: ⚠️ Is this a breaking change?
      options:
        - label: Yes, this change breaks existing functionality (explain in summary)

  - type: checkboxes
    id: testing
    attributes:
      label: 🧪 Testing
      options:
        - label: CI passed
        - label: Manually tested (local/dev cluster)
        - label: Unit tested
        - label: Not tested (explain why in comments)

  - type: input
    id: related
    attributes:
      label: 🔗 Related Issues / Tickets
      placeholder: "e.g. Closes #42, Related to #99"

  - type: checkboxes
    id: checklist
    attributes:
      label: ✅ Checklist
      options:
        - label: Code compiles and passes all tests
        - label: Linting and style checks pass
        - label: Comments added for complex logic
        - label: Documentation updated (if applicable)

  - type: textarea
    id: context
    attributes:
      label: 📎 Additional Context (optional)
      description: Add logs, screenshots, diagrams, or design notes.
