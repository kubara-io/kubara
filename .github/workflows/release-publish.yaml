name: Publish Homebrew Tap

on:
  release:
    types: [published]

jobs:
  publish-tap:
    runs-on: ubuntu-latest
    environment: signing
    steps:
      - name: Checkout kubara repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go-binary/go.mod
          cache: true
          cache-dependency-path: go-binary/go.sum

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_GITHUB_APP_ID }}
          private-key: ${{ secrets.RELEASE_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            ${{ github.event.repository.name }}
            homebrew-tap

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          workdir: go-binary
          args: release --skip=build,archive,sign,notarize
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
