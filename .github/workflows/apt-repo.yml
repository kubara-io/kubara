name: APT Repository

on:
  workflow_run:
    workflows: [ "release" ]
    types: [ completed ]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'The release tag to build the APT repo for (e.g., v1.2.3)'
        required: true

permissions:
  contents: write # Changed: Required to push commits to the gh-pages branch

concurrency:
  group: gh-pages-publish # Added: Prevents race conditions with the docs workflow
  cancel-in-progress: false

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build-and-deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || inputs.release_tag }}
          fetch-depth: 0

      - name: Determine Target Tag
        id: get_tag
        run: |
          set -e
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            TAG=$(git describe --tags --exact-match ${{ github.event.workflow_run.head_sha }})
          else
            TAG="${{ inputs.release_tag }}"
          fi
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "tag_name=$TAG" >> $GITHUB_OUTPUT

      - name: Install APT Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev apt-utils

      - name: Import GPG key
        id: import-gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Download Release Artifacts (*.deb)
        run: |
          set -e
          REPO="${{ github.repository }}"
          gh release download ${{ steps.get_tag.outputs.tag_name }} --repo $REPO --pattern "*.deb"

      - name: Build APT Repository Structure
        run: |
          set -e
          mkdir -p public/pool/main
          mkdir -p public/dists/stable/main/binary-amd64
          mkdir -p public/dists/stable/main/binary-arm64
          
          mv *.deb public/pool/main/
          
          cd public
          
          # 1. Scan and build Packages for amd64 ONLY
          dpkg-scanpackages -a amd64 pool/main /dev/null > dists/stable/main/binary-amd64/Packages
          gzip -9c < dists/stable/main/binary-amd64/Packages > dists/stable/main/binary-amd64/Packages.gz
          
          # 2. Scan and build Packages for arm64 ONLY
          dpkg-scanpackages -a arm64 pool/main /dev/null > dists/stable/main/binary-arm64/Packages
          gzip -9c < dists/stable/main/binary-arm64/Packages > dists/stable/main/binary-arm64/Packages.gz
          
          # 3. Generate Release file with Metadata
          cd dists/stable
          cat <<EOF > apt-release.conf
          APT::FTPArchive::Release::Origin "kubara-io";
          APT::FTPArchive::Release::Label "Kubara";
          APT::FTPArchive::Release::Suite "stable";
          APT::FTPArchive::Release::Codename "stable";
          APT::FTPArchive::Release::Architectures "amd64 arm64";
          APT::FTPArchive::Release::Components "main";
          EOF
          apt-ftparchive -c apt-release.conf release . > Release

      - name: Sign Repository
        run: |
          set -e
          cd public/dists/stable
          gpg --batch --yes --local-user "${{ steps.import-gpg.outputs.fingerprint }}" --clearsign -o InRelease Release
          gpg --batch --yes --local-user "${{ steps.import-gpg.outputs.fingerprint }}" -abs -o Release.gpg Release

      - name: Export Public Key
        run: |
          set -e
          gpg --armor --export "${{ steps.import-gpg.outputs.fingerprint }}" > public/apt-public.key

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: true # CRITICAL: Prevents overwriting the docs generated by Mike
