name: docs-check

on:
  pull_request:
    branches:
      - 'main'
    paths:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-docs:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ./docs
    steps:
      - name: Checkout kubara repo
        uses: actions/checkout@v6

      - name: Read Python version from Pipfile
        id: python-version
        run: |
          set -euo pipefail
          PYTHON_VERSION="$(sed -nE 's/^python_full_version = "([^"]+)"/\1/p' Pipfile | head -n1)"
          if [ -z "$PYTHON_VERSION" ]; then
            PYTHON_VERSION="$(sed -nE 's/^python_version = "([^"]+)"/\1/p' Pipfile | head -n1)"
          fi
          if [ -z "$PYTHON_VERSION" ]; then
            echo "::error::No python_full_version/python_version found in docs/Pipfile"
            exit 1
          fi
          echo "version=$PYTHON_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ steps.python-version.outputs.version }}
          cache: 'pip'
          cache-dependency-path: 'docs/Pipfile.lock'

      - name: Cache pipenv virtualenvs
        uses: actions/cache@v5
        with:
          path: ~/.local/share/virtualenvs
          key: ${{ runner.os }}-python-${{ steps.setup-python.outputs.python-version }}-pipenv-${{ hashFiles('docs/Pipfile.lock') }}

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --user --no-warn-script-location pipenv
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/pipenv" install --deploy

      - name: Validate docs build (strict)
        run: |
          set -euo pipefail
          "$HOME/.local/bin/pipenv" run mkdocs build --strict
