name: docs-check

on:
  pull_request:
    branches:
      - 'main'
    paths:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-docs:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ./docs
    steps:
      - name: Checkout kubara repo
        uses: actions/checkout@v6

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14.3'
          cache: 'pip'
          cache-dependency-path: 'docs/Pipfile.lock'

      - name: Cache pipenv virtualenvs
        uses: actions/cache@v5
        with:
          path: ~/.local/share/virtualenvs
          key: ${{ runner.os }}-python-${{ steps.setup-python.outputs.python-version }}-pipenv-${{ hashFiles('docs/Pipfile.lock') }}

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --user --no-warn-script-location pipenv
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/pipenv" install --deploy

      - name: Validate docs build (strict)
        run: |
          set -euo pipefail
          "$HOME/.local/bin/pipenv" run mkdocs build --strict

