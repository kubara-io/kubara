name: release trigger apt

on:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  trigger-apt-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger APT repository publish
        env:
          APT_REPO_DISPATCH_TOKEN: ${{ secrets.APT_REPO_DISPATCH_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          if [ -z "${APT_REPO_DISPATCH_TOKEN}" ]; then
            echo "Missing secret: APT_REPO_DISPATCH_TOKEN" >&2
            exit 1
          fi

          if [ -z "${RELEASE_TAG}" ]; then
            echo "Missing release tag in release event payload" >&2
            exit 1
          fi

          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${APT_REPO_DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/kubara-io/apt/dispatches \
            -d "{\"event_type\":\"publish-apt\",\"client_payload\":{\"release_tag\":\"${RELEASE_TAG}\"}}"
